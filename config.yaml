global_num_threads: 4
# Transport hardening for the HTTP / WebSocket control plane.
# Both fields are optional and default to backward-compatible behavior.
security:
  # Shared bearer token required on control endpoints (/api/execute, /api/ask,
  # /ask, /api/reload-speakers) and to open the Node-RED WebSocket. Empty = auth
  # disabled (any LAN client can drive the device). Sent via
  # "Authorization: Bearer <token>", "X-Auth-Token", or "?token=".
  auth_token: ""
  # Browser Origins allowed to open WebSockets. "*" allows any; empty list allows
  # only localhost and same-origin requests. Non-browser clients (no Origin
  # header) are always allowed.
  allowed_origins: []
models:
  vad:
    silero_onnx_path: "./models/silero_vad.onnx"
    threshold: 0.5
    min_silence_duration_ms: 700
  asr:
    encoder: "./models/sherpa-onnx-moonshine-base-es-quantized-2026-02-27/encoder_model.ort"
    decoder: "./models/sherpa-onnx-moonshine-base-es-quantized-2026-02-27/decoder_model_merged.ort"
    tokens: "./models/sherpa-onnx-moonshine-base-es-quantized-2026-02-27/tokens.txt"
  speaker_id:
    model: "./models/wespeaker_en_voxceleb_CAM++.onnx"
    embeddings_dir: "./models/known_speakers/"
    min_audio_duration_seconds: 2
    confidence_threshold: 0.55
    challenge_failed_prompt: "Acceso denegado."
    challenge_init_promt: "Por favor, repita"
    challenge_prompts:
      - "Mi voz es mi pasaporte."
      - "Confirmo mi identidad mediante el timbre acústico de mi voz."
      - "Sistema Vocalis, autoriza el acceso a mi perfil personal."
      - "Verificación biométrica en curso para el control principal."
      - "Esta es mi clave vocal de seguridad para hoy."
      - "Reconoce mis patrones de voz y ejecuta el comando."
  tts:
    engine: "supertonic"
    model_dir: "./models/sherpa-onnx-supertonic-3-tts-int8-2026-05-11"
    cache:
      enabled: true
      dir: "./models/tts_cache"
      pre_generate:
        - "Sí, ¿qué desea?"
        - "Disculpe, no le he oído. ¿Quién es?"
        - "La persona de la puerta no dice quién es."
        - "Espere por favor"
        - "Hay alguien en la puerta!"
        - "Un momento, por favor"
        - "¿Qué desea?"
        - "¿Cómo puedo ayudar?"
        - "Sí, mi señor"
        - "Acceso denegado."
        - "Por favor, repita"
        - "Mi voz es mi pasaporte."
        - "Confirmo mi identidad mediante el timbre acústico de mi voz."
        - "Sistema Vocalis, autoriza el acceso a mi perfil personal."
        - "Verificación biométrica en curso para el control principal."
        - "Esta es mi clave vocal de seguridad para hoy."
        - "Reconoce mis patrones de voz y ejecuta el comando."

mqtt:
  enabled: false
  broker: "tcp://localhost:1883"
  client_id: "gocalis"
  username: ""
  password: ""
  topic_prefix: "gocalis"
  qos: 1
  auto_reconnect: true

nodes:
  - node_id: "living_room"
    type: "local"
    audio:
      input_device_index: "Anker PowerConf S330"
      output_device_index: "Anker PowerConf S330"
      sample_rate: 16000
      channels: 1
      chunk_size: 1024
      gain: 1.5
    kws:
      enabled: true
      encoder: "./models/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01/encoder-epoch-12-avg-2-chunk-16-left-64.int8.onnx"
      decoder: "./models/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01/decoder-epoch-12-avg-2-chunk-16-left-64.int8.onnx"
      joiner: "./models/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01/joiner-epoch-12-avg-2-chunk-16-left-64.int8.onnx"
      tokens: "./models/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01/tokens.txt"
      keywords_file: "./models/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01/keywords.txt"
      threshold: 0.25
      auto_ask: true
      priority: 10
      wake_responses: []
      num_threads: 1

  - node_id: "front_door"
    type: "rtc_stream"
    rtc_stream:
      rtsp_url: "rtsp://192.168.50.5:8554/doorbell_raw_homekit?audio=all"
      api_url: "http://192.168.50.5:1984"
      stream_name: "doorbell"
      codec: "eld"
      output_gain_db: 6.0
      # Route outbound TTS to the Aqara G4 HomeKit backchannel via go2rtc:
      # gocalis pushes Opus over a WebRTC WHIP producer into talkback_in_stream,
      # then go2rtc transcodes it to AAC-ELD into talkback_stream. Inbound
      # doorbell mic audio (wake/ASR) keeps flowing over the receive WebRTC
      # connection to stream_name.
      talkback_stream: "doorbell_raw_homekit"
      talkback_in_stream: "talkback_in"
      # Set true only if the device/transport performs acoustic echo cancellation.
      # When false (default), the brain runs a half-duplex gate: the mic capture
      # path is muted while the node is SPEAKING to prevent self-barge-in.
      echo_cancellation: false
    kws:
      enabled: true
      encoder: "./models/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01/encoder-epoch-12-avg-2-chunk-16-left-64.int8.onnx"
      decoder: "./models/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01/decoder-epoch-12-avg-2-chunk-16-left-64.int8.onnx"
      joiner: "./models/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01/joiner-epoch-12-avg-2-chunk-16-left-64.int8.onnx"
      tokens: "./models/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01/tokens.txt"
      keywords_file: "./models/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01/keywords.txt"
      threshold: 0.25
      auto_ask: true
      priority: 10
      wake_responses: 
        - "¿Qué desea?"
        - "¿Cómo puedo ayudar?"
        - "Sí, mi señor"
      num_threads: 1

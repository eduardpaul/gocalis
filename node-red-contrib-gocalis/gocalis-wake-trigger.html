<script type="text/javascript">
    RED.nodes.registerType('gocalis-wake-trigger',{
        category: 'Gocalis Voice',
        color: '#a78bfa',
        defaults: {
            name: { value: "" },
            server: { value: "", type: "gocalis-config", required: true },
            nodeId: { value: "all" }
        },
        inputs: 0,
        outputs: 2,
        outputLabels: ["Wake Event", "Command (Auto-Ask Result)"],
        icon: "font-awesome/fa-bell",

            return this.name || "Gocalis Wake Trigger";

        paletteLabel: "gocalis wake"
    });

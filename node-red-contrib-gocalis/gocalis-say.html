<script type="text/javascript">
    RED.nodes.registerType('gocalis-say',{
        category: 'Gocalis Voice',
        color: '#a78bfa',
        defaults: {
            name: { value: "" },
            server: { value: "", type: "gocalis-config", required: true },
            nodeId: { value: "default" },
            nodeIdType: { value: "str" },
            text: { value: "" },
            textType: { value: "str" },
            bargeIn: { value: false },
            priority: { value: 0, validate: RED.validators.number() }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-volume-up",
        label: function() {
            return this.name || this.text || "Gocalis Say";
        },
        paletteLabel: "gocalis say",
        oneditprepare: function() {
            $("#node-input-text").typedInput({
                default: 'str',
                typeField: $("#node-input-textType"),
                types: ['str', 'msg', 'flow', 'global', 'env', 'jsonata']
            });
            $("#node-input-nodeId").typedInput({
                default: 'str',
                typeField: $("#node-input-nodeIdType"),
                types: ['str', 'msg', 'flow', 'global', 'env', 'jsonata']
            });
        }
    });
</script>

<script type="text/html" data-template-name="gocalis-say">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row">
        <label for="node-input-nodeId"><i class="fa fa-server"></i> Node ID</label>
        <input type="text" id="node-input-nodeId" placeholder="Physical node ID (default: 'default')" style="width: 70%;">
        <input type="hidden" id="node-input-nodeIdType">
    </div>
    <div class="form-row">
        <label for="node-input-text"><i class="fa fa-comment"></i> TTS Text</label>
        <input type="text" id="node-input-text" placeholder="Text to say (leave blank to use msg.payload)" style="width: 70%;">
        <input type="hidden" id="node-input-textType">
    </div>
    <div class="form-row">
        <label for="node-input-bargeIn"><i class="fa fa-hand-paper-o"></i> Barge-In</label>
        <input type="checkbox" id="node-input-bargeIn" style="display: inline-block; width: auto; vertical-align: top;">
        <span>Allow user to interrupt speech playback</span>
    </div>
    <div class="form-row">
        <label for="node-input-priority"><i class="fa fa-sort-amount-desc"></i> Priority</label>
        <input type="number" id="node-input-priority" placeholder="0" min="0" step="1">
    </div>
</script>

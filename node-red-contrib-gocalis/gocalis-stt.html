<script type="text/javascript">
    RED.nodes.registerType('gocalis-stt',{
        category: 'Gocalis Voice',
        color: '#a78bfa',
        defaults: {
            name: { value: "" },
            server: { value: "", type: "gocalis-config", required: true },
            nodeId: { value: "default" },
            nodeIdType: { value: "str" },
            audioFile: { value: "" },
            audioFileType: { value: "str" },
            requireSpeakerId: { value: false },
            priority: { value: 0 }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-file-audio-o",
        label: function() {
            return this.name || "Gocalis STT";
        },
        paletteLabel: "gocalis stt",
        oneditprepare: function() {
            $("#node-input-nodeId").typedInput({
                default: 'str',
                typeField: $("#node-input-nodeIdType"),
                types: ['str', 'msg', 'flow', 'global', 'env', 'jsonata']
            });
            $("#node-input-audioFile").typedInput({
                default: 'str',
                typeField: $("#node-input-audioFileType"),
                types: ['str', 'msg', 'flow', 'global', 'env', 'jsonata']
            });
        }
    });
</script>

<script type="text/html" data-template-name="gocalis-stt">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-server"></i> Server</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row">
        <label for="node-input-nodeId"><i class="fa fa-microphone"></i> Node ID</label>
        <input type="text" id="node-input-nodeId" placeholder="default" style="width: 70%;">
        <input type="hidden" id="node-input-nodeIdType">
    </div>
    <div class="form-row">
        <label for="node-input-audioFile"><i class="fa fa-file-audio-o"></i> Audio Source</label>
        <input type="text" id="node-input-audioFile" placeholder="Server-accessible file path (or leave empty to use msg.payload)" style="width: 70%;">
        <input type="hidden" id="node-input-audioFileType">
    </div>
    <div class="form-row">
        <label for="node-input-requireSpeakerId"><i class="fa fa-user-secret"></i> Verify Speaker</label>
        <input type="checkbox" id="node-input-requireSpeakerId" style="display: inline-block; width: auto; vertical-align: top;">
        <span>Require biometric speaker identification</span>
    </div>
    <div class="form-row">
        <label for="node-input-priority"><i class="fa fa-sort-numeric-asc"></i> Priority</label>
        <input type="number" id="node-input-priority" placeholder="0" style="width: 100px;">
    </div>
</script>
